<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --red: #ff0000;
            --dark: #0a0a0a;
            --card: #121212;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
        }
        .topbar {
            background: #111;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #222;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 800;
            color: var(--red);
        }
        .profile-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1a1a1a;
            padding: 6px 14px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .profile-btn:hover { background: #222; }
        .avatar {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #ff0000, #aa0000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        .main {
            max-width: 680px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, #ff6666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .input-box {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 8px;
            display: flex;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 20px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        button {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-red {
            background: var(--red);
            color: white;
        }
        .btn-red:hover { background: #cc0000; transform: translateY(-2px); }
        .options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .option-card {
            background: #1a1a1a;
            padding: 12px 18px;
            border-radius: 12px;
            flex: 1;
            min-width: 140px;
        }
        .label { font-size: 11px; color: #888; margin-bottom: 6px; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="logo">
            <i class="fab fa-youtube"></i>
            INTERNET DOWNLOADER
        </div>
        <div class="profile-btn" onclick="showProfile()">
            <div class="avatar">M</div>
            <div>
                <div style="font-weight:600;">makerxm800</div>
                <div style="font-size:12px;color:#888;">Online</div>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="hero">
            <h1>Download Anything.</h1>
            <h1 style="color:#ff6666;">Zero Limits.</h1>
            <p style="color:#aaa;margin-top:10px;">YouTube • Shorts • Playlists • Audio • 4K</p>
        </div>

        <div class="input-box">
            <input type="text" id="url" placeholder="Paste YouTube, Shorts or any link here...">
            <button class="btn-red" onclick="startDownload()">Download</button>
        </div>

        <div class="options">
            <div class="option-card">
                <div class="label">MODE</div>
                <select id="mode" style="width:100%;background:#222;color:white;padding:10px;border-radius:8px;border:none;">
                    <option>Video + Audio</option>
                    <option>Audio Only (MP3)</option>
                    <option>Playlist</option>
                </select>
            </div>
            <div class="option-card">
                <div class="label">QUALITY</div>
                <select id="quality" style="width:100%;background:#222;color:white;padding:10px;border-radius:8px;border:none;">
                    <option>Best (Max Quality)</option>
                    <option>1080p</option>
                    <option>720p</option>
                    <option>480p</option>
                </select>
            </div>
            <div class="option-card">
                <div class="label">FORMAT</div>
                <select id="format" style="width:100%;background:#222;color:white;padding:10px;border-radius:8px;border:none;">
                    <option>mp4</option>
                    <option>mp3</option>
                </select>
            </div>
        </div>

        <button class="btn-red" style="width:100%;padding:16px;font-size:18px;" onclick="startDownload()">
            ⬇ Download Now
        </button>

        <div id="progress-area" style="display:none;margin-top:30px;">
            <h3 id="title" style="margin-bottom:10px;"></h3>
            <div style="height:10px;background:#222;border-radius:999px;overflow:hidden;">
                <div id="progress" style="height:100%;width:0%;background:#ff0000;transition:width 0.4s;"></div>
            </div>
            <p id="status" style="text-align:center;margin-top:10px;color:#aaa;"></p>
        </div>
    </div>

    <script>
        function showProfile() {
            alert("👤 makerxm800\nInternet Downloader\n\nLocal & Private");
        }

        async function startDownload() {
            const url = document.getElementById("url").value.trim();
            if (!url) return alert("Please paste a link!");

            document.getElementById("progress-area").style.display = "block";
            document.getElementById("title").textContent = "Starting download...";
            document.getElementById("status").textContent = "Connecting...";

            const res = await fetch("/api/download", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({url})
            });
            const data = await res.json();

            if (data.job_id) {
                watchProgress(data.job_id);
            }
        }

        function watchProgress(job_id) {
            const evt = new EventSource(`/api/progress/${job_id}`);
            evt.onmessage = (e) => {
                const job = JSON.parse(e.data);
                document.getElementById("title").textContent = job.title || "Downloading...";
                document.getElementById("progress").style.width = job.progress * 100 + "%";
                document.getElementById("status").textContent = `${job.status} • ${job.speed || ''} • ${job.eta || ''}`;
            };
        }
    </script>
</body>
</html>
