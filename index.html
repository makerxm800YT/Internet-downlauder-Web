<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Downloader</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #eee;
      margin: 0;
      padding: 20px;
    }
    .container { max-width: 800px; margin: auto; }
    h1 { color: #ff0000; text-align: center; }
    input, select, button {
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }
    input, select { background: #1f1f1f; color: white; width: 100%; }
    button {
      background: #ff0000;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #ff3333; }
    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    #log {
      background: #111;
      height: 180px;
      overflow-y: auto;
      padding: 12px;
      font-family: monospace;
      font-size: 0.9em;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎥 YouTube Downloader</h1>

    <div class="card">
      <label>Video / Playlist URL</label>
      <input type="text" id="url" placeholder="https://youtube.com/watch?v=...">
    </div>

    <div class="card">
      <label>Mode</label>
      <select id="mode">
        <option value="Video">Video</option>
        <option value="Audio Only">Audio Only (MP3)</option>
        <option value="Playlist Video">Playlist — Video</option>
        <option value="Playlist Audio">Playlist — Audio</option>
      </select>

      <label>Quality</label>
      <select id="quality">
        <option value="Best Quality">Best Quality</option>
        <option value="1080p">1080p</option>
        <option value="720p">720p</option>
        <option value="480p">480p</option>
      </select>

      <label>Format</label>
      <select id="format">
        <option value="mp4">MP4</option>
        <option value="mkv">MKV</option>
        <option value="webm">WEBM</option>
      </select>
    </div>

    <div class="card">
      <label>Save Folder</label>
      <button onclick="chooseFolder()">Choose Folder</button>
      <p id="savePath">Default: Downloads/YTDownloads</p>
    </div>

    <button onclick="startDownload()" style="width:100%; padding:16px; font-size:1.1em;">
      ⬇ DOWNLOAD NOW
    </button>

    <div class="card">
      <strong>Status</strong>
      <div id="status">Ready</div>
      <div id="log"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
