<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Downloader</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
        --red: #e63232;
        --bg: #0b0b0b;
        --card: #161616;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: #f2f2f2;
        height: 100vh;
        overflow: hidden;
    }
    .container { max-width: 820px; margin: 40px auto; padding: 20px; }

    .header {
        text-align: center;
        margin-bottom: 30px;
    }
    .logo {
        font-family: 'Syne', sans-serif;
        font-size: 28px;
        color: var(--red);
    }

    .card {
        background: var(--card);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 20px;
        border: 1px solid #333;
    }

    input, select, button {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border-radius: 12px;
        border: none;
        font-size: 15px;
    }
    input, select {
        background: #222;
        color: white;
    }
    button {
        background: var(--red);
        color: white;
        font-weight: 600;
        cursor: pointer;
        margin-top: 10px;
    }
    button:hover { background: #ff4f4f; }

    .log {
        background: #111;
        padding: 15px;
        border-radius: 12px;
        height: 220px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 13px;
        white-space: pre-wrap;
    }

    .status { margin: 10px 0; font-weight: 500; }
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="logo">YouTube Downloader</div>
        <p>Free • Fast • Unlimited</p>
    </div>

    <!-- Login Area (Simple) -->
    <div id="login-area" class="card">
        <h2>Sign In</h2>
        <input type="email" id="email" placeholder="Email address" value="user@example.com">
        <input type="password" id="password" placeholder="Password" value="123456">
        <button onclick="login()">Sign In</button>
        <button onclick="googleLogin()" style="background:#4285f4;">Continue with Google</button>
    </div>

    <!-- Main App -->
    <div id="main-app" style="display:none;">

        <div class="card">
            <h3>Paste YouTube Link</h3>
            <input type="text" id="url" placeholder="https://youtube.com/watch?v=... or Shorts link">
            
            <div style="display:flex; gap:10px; margin-top:10px;">
                <select id="mode">
                    <option value="Video">Video</option>
                    <option value="Audio">Audio Only (MP3)</option>
                </select>
                <select id="quality">
                    <option value="best">Best Quality</option>
                    <option value="1080">1080p</option>
                    <option value="720">720p</option>
                </select>
            </div>

            <button onclick="startDownload()">⬇ DOWNLOAD NOW</button>
        </div>

        <div class="card">
            <div class="status" id="status">Ready</div>
            <div class="log" id="log">Waiting for download...</div>
        </div>

        <button onclick="logout()" style="background:#333;">Sign Out</button>
    </div>
</div>

<script>
// Safe Storage
const Storage = {
    get: (k) => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; }},
    set: (k,v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

let currentUser = null;

function login() {
    const email = document.getElementById('email').value;
    currentUser = { name: email.split('@')[0], email: email };
    Storage.set('user', currentUser);
    showMainApp();
}

function googleLogin() {
    const email = prompt("Enter your Gmail address:");
    if (email) {
        currentUser = { name: email.split('@')[0], email: email };
        Storage.set('user', currentUser);
        showMainApp();
    }
}

function showMainApp() {
    document.getElementById('login-area').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
}

function logout() {
    Storage.set('user', null);
    location.reload();
}

// Download Function
async function startDownload() {
    const url = document.getElementById('url').value.trim();
    if (!url) return alert("Please paste a YouTube link");

    const log = document.getElementById('log');
    const status = document.getElementById('status');
    
    log.innerHTML = "Starting download...\n";
    status.textContent = "Downloading...";

    try {
        const res = await fetch('/api/download', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ url: url })
        });
        const data = await res.json();

        if (data.job_id) {
            const es = new EventSource(`/api/progress/${data.job_id}`);
            es.onmessage = (e) => {
                const job = JSON.parse(e.data);
                log.innerHTML += `Progress: ${job.progress || 0}%\n`;
                log.scrollTop = log.scrollHeight;

                if (job.done) {
                    es.close();
                    status.textContent = job.status === "done" ? "✅ Completed!" : "❌ Failed";
                }
            };
        }
    } catch (err) {
        log.innerHTML += "Error: " + err + "\n";
    }
}

// Auto login if saved
if (Storage.get('user')) {
    currentUser = Storage.get('user');
    showMainApp();
}
</script>

</body>
</html>
