<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YTDL - makerxm800</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root { --red: #ff0000; }
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
        }
        .header {
            background: #111;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .avatar {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #ff0000, #c80000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            border: 2px solid #fff;
        }
        .username {
            font-size: 20px;
            font-weight: 600;
        }
        .bio {
            font-size: 13px;
            color: #888;
        }
        .container {
            max-width: 520px;
            margin: 30px auto;
            padding: 0 15px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        input {
            width: 100%;
            padding: 16px;
            margin: 15px 0;
            background: #222;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover { transform: translateY(-2px); }
        .btn-red { background: var(--red); color: white; }
        .btn-gray { background: #333; color: white; }
        .settings-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }
    </style>
</head>
<body>
    <!-- Header with Profile -->
    <div class="header">
        <div class="profile" onclick="alert('Profile Page - Coming Soon!')">
            <div class="avatar">M</div>
            <div>
                <div class="username">makerxm800</div>
                <div class="bio">Downloader • Local App</div>
            </div>
        </div>
        <button class="settings-btn" onclick="alert('Settings coming soon! ✨')">
            <i class="fas fa-cog"></i>
        </button>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="text-align:center; margin-bottom:20px;">Download Media</h2>
            
            <input type="text" id="url" placeholder="Paste YouTube, Shorts or Spotify link...">

            <button class="btn-red" onclick="downloadVideo()">
                <i class="fab fa-youtube"></i> Download YouTube / Shorts
            </button>

            <button class="btn-gray" onclick="downloadAudio()">
                🎵 Audio Only (MP3)
            </button>

            <div id="progress-area" style="display:none; margin-top:25px;">
                <h3 id="title"></h3>
                <div style="height:10px; background:#333; border-radius:999px; overflow:hidden;">
                    <div id="progress" style="height:100%; width:0%; background:#ff0000; transition:width 0.4s;"></div>
                </div>
                <p id="status" style="text-align:center; margin:10px 0; font-size:14px;"></p>
                <div id="log" style="background:#000; padding:12px; border-radius:12px; max-height:200px; overflow:auto; font-size:14px;"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
