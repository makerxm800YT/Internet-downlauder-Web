<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <style>
        body { font-family: system-ui; background:#0f0f0f; color:white; text-align:center; padding:20px; }
        .card { max-width:500px; margin:40px auto; background:#1f1f1f; padding:30px; border-radius:20px; }
        input { width:100%; padding:15px; margin:15px 0; border-radius:12px; border:none; background:#333; color:white; font-size:16px; }
        button { width:100%; padding:15px; margin:10px 0; border:none; border-radius:12px; font-size:17px; cursor:pointer; }
        .btn-red { background:#ff0000; }
        .progress { height:10px; background:#ff0000; width:0%; margin:15px 0; border-radius:999px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>▶ YouTube Downloader</h1>
        <p>Local • Private • Fast</p>

        <input type="text" id="url" placeholder="Paste YouTube or Shorts URL">
        
        <button class="btn-red" onclick="download()">⬇ Download (Best Quality)</button>
        <button onclick="downloadAudio()">🎵 Download Audio Only (MP3)</button>

        <div id="progress-area" style="display:none; margin-top:20px;">
            <h3 id="title"></h3>
            <div class="progress" id="progress"></div>
            <p id="status"></p>
            <div id="log" style="text-align:left; background:#000; padding:10px; border-radius:10px; max-height:200px; overflow:auto; font-size:14px;"></div>
        </div>
    </div>

    <script>
        async function download() {
            const url = document.getElementById("url").value.trim();
            if (!url) return alert("Paste a URL first!");

            const res = await fetch("/api/download", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({url, quality: "Best"})
            });
            const data = await res.json();
            if (data.job_id) watchProgress(data.job_id);
        }

        async function downloadAudio() {
            const url = document.getElementById("url").value.trim();
            if (!url) return alert("Paste a URL first!");

            const res = await fetch("/api/download", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({url, quality: "Best"})
            });
            const data = await res.json();
            if (data.job_id) watchProgress(data.job_id);
        }

        function watchProgress(job_id) {
            document.getElementById("progress-area").style.display = "block";
            const evt = new EventSource(`/api/progress/${job_id}`);
            evt.onmessage = e => {
                const job = JSON.parse(e.data);
                document.getElementById("title").textContent = job.title || "Downloading...";
                document.getElementById("progress").style.width = job.progress * 100 + "%";
                document.getElementById("status").textContent = `${job.status} ${job.speed} ${job.eta}`;
                
                const log = document.getElementById("log");
                log.innerHTML = job.log.map(l => `<div>${l}</div>`).join('');
                log.scrollTop = log.scrollHeight;
            };
        }
    </script>
</body>
</html>
