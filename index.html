<script>
    async function pasteLink() {
        const text = await navigator.clipboard.readText();
        document.getElementById('url').value = text;
    }

    function runDownload() {
        const url = document.getElementById('url').value;
        const quality = document.getElementById('quality').value;
        const format = document.getElementById('format').value;
        const ext = document.getElementById('ext').value;

        if(!url) return alert("Enter a URL first!");

        // Show loading state
        const btn = document.querySelector('.btn-main');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        btn.innerText = "🛠️ PROCESSING AUDIO/VIDEO...";
        status.classList.remove('hidden');
        status.innerHTML = '<p class="text-xs font-bold text-red-500 animate-pulse">FIXING SOUND & MERGING 4K... PLEASE WAIT.</p>';

        const query = `url=${encodeURIComponent(url)}&quality=${quality}&format=${format}&ext=${ext}`;
        
        // This will trigger the download once the server finishes merging
        window.location.href = `/download?${query}`;

        // Reset button after a delay
        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = "🚀 START DOWNLOAD";
        }, 10000);
    }
</script>
