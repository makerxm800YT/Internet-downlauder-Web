<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0000;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
        }
        header {
            background: #1f1f1f;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #1f1f1f;
            color: white;
            margin-bottom: 10px;
        }
        button {
            padding: 14px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
        }
        button:hover { background: #cc0000; }
        .section {
            background: #1f1f1f;
            margin: 20px 0;
            padding: 20px;
            border-radius: 12px;
        }
        .progress-bar {
            height: 8px;
            background: var(--primary);
            width: 0%;
            border-radius: 4px;
            margin: 10px 0;
        }
        .log {
            background: #000;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
        }
        .history-item {
            padding: 10px;
            background: #2a2a2a;
            margin: 8px 0;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <header>
        <h1>▶ YouTube Downloader</h1>
        <p>Max Quality • Shorts Supported • Local</p>
    </header>

    <div class="container">
        <!-- Login / Register -->
        <div id="auth-section" class="section">
            <h2>Account</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <input type="text" id="name" placeholder="Your Name (for register)">
            <button onclick="login()">Login</button>
            <button onclick="register()">Register</button>
            <button onclick="googleLogin()">Continue with Google</button>
        </div>

        <!-- Main Downloader -->
        <div id="main-section" class="section" style="display:none;">
            <h2>Download Video / Short</h2>
            <input type="text" id="url" placeholder="Paste YouTube or Shorts URL here...">
            <button onclick="startDownload()">⬇ Download</button>

            <div id="progress-section" style="display:none;">
                <h3 id="title"></h3>
                <div class="progress-bar" id="progress"></div>
                <p id="status"></p>
                <div class="log" id="log"></div>
            </div>

            <button onclick="showHistory()">📜 View History</button>
        </div>

        <!-- History -->
        <div id="history-section" class="section" style="display:none;">
            <h2>Download History</h2>
            <div id="history-list"></div>
            <button onclick="backToMain()">← Back</button>
        </div>
    </div>

    <script src="idk.js"></script>
</body>
</html>
