<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StreamVault JS | Unlimited</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #080808; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .glow-button { background: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); transition: 0.3s; }
        .glow-button:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="glass p-10 rounded-[3rem] w-full max-w-lg text-center">
        <h1 class="text-4xl font-black mb-2 tracking-tighter">YT <span class="text-red-600">FREE</span></h1>
        <p class="text-gray-500 text-xs mb-8 tracking-widest uppercase">Unlimited • No Python • High Speed</p>
        
        <input type="text" id="url" placeholder="Paste link here..." 
            class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl mb-4 focus:outline-none focus:ring-2 focus:ring-red-600 transition-all">

        <select id="quality" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl mb-6 outline-none">
            <option value="highest" class="bg-black">Highest Quality (4K/1080p)</option>
            <option value="137" class="bg-black">1080p Only</option>
            <option value="136" class="bg-black">720p Only</option>
            <option value="134" class="bg-black">360p (Fast)</option>
        </select>

        <button onclick="downloadVideo()" class="glow-button w-full p-5 rounded-2xl font-bold text-lg">🚀 Download Now</button>
        
        <p id="status" class="mt-6 text-sm text-gray-400"></p>
    </div>

    <script>
        function downloadVideo() {
            const url = document.getElementById('url').value;
            const quality = document.getElementById('quality').value;
            const status = document.getElementById('status');

            if(!url) return alert("Please enter a URL");

            status.innerText = "⚡ Preparing your download...";
            
            // In Node version, we just redirect the window to the download path
            // The browser handles the download progress automatically!
            window.location.href = `/download?url=${encodeURIComponent(url)}&quality=${quality}`;
            
            setTimeout(() => {
                status.innerText = "✅ Check your browser downloads!";
            }, 3000);
        }
    </script>
</body>
</html>
