<script>
// === SAFE STORAGE (Fixes SecurityError) ===
const Storage = {
    get(key, defaultValue = null) {
        try {
            const value = localStorage.getItem(key);
            return value ? JSON.parse(value) : defaultValue;
        } catch (e) {
            console.warn("localStorage blocked:", e);
            return defaultValue;
        }
    },
    set(key, value) {
        try {
            localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
            console.warn("Cannot save to localStorage:", e);
        }
    },
    remove(key) {
        try { localStorage.removeItem(key); } catch(e){}
    }
};

let _user = null;
let _mode = 'login';
let _job = null;
let _downloading = false;

function launchApp(user){
  _user = user;
  Storage.set('ytdl_user', user);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').classList.add('visible');
  
  document.getElementById('hdr-avatar').textContent = user.name ? user.name[0].toUpperCase() : '?';
  document.getElementById('hdr-name').textContent = user.name || 'User';
  document.getElementById('hdr-email').textContent = user.email || '';
  
  loadYtdlpVer();
  loadHistory();
}

function signOut(){
  _user = null;
  Storage.remove('ytdl_user');
  document.getElementById('main-app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
}

// Rest of your script functions (paste your existing script functions here)
document.addEventListener('DOMContentLoaded', () => {
  const saved = Storage.get('ytdl_user');
  if (saved) launchApp(saved);
  initDesktopFeatures();
});
</script>
