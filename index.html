<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0000;
            --dark: #0a0a0a;
            --card: #1a1a1a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1f1f1f);
            color: #fff;
            min-height: 100vh;
        }
        header {
            background: #111;
            padding: 25px;
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }
        .container {
            max-width: 460px;
            margin: 40px auto;
            padding: 0 15px;
        }
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }

        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #252525;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        input:focus {
            outline: 2px solid var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(255,0,0,0.4);
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #cc0000; }
        .btn-google { background: #4285F4; color: white; }
        .btn-secondary { background: #333; color: white; }

        .section { display: none; }
        .active { display: block; }

        .progress-bar {
            height: 12px;
            background: var(--primary);
            width: 0%;
            border-radius: 999px;
            margin: 15px 0;
            transition: width 0.4s ease;
        }
        .log {
            background: #000;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <header>
        <h1>▶ YT Downloader</h1>
        <p>Local • Private • Max Quality</p>
    </header>

    <div class="container">
        <!-- Auth Card -->
        <div id="auth-card" class="card active">
            <h2 style="text-align:center; margin-bottom:20px;">Welcome</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <input type="text" id="name" placeholder="Your Name (Register only)">

            <button class="btn-primary" onclick="login()">Login</button>
            <button class="btn-primary" onclick="register()">Create Account</button>
            <button class="btn-google" onclick="googleLogin()">
                <i class="fab fa-google"></i> Continue with Google
            </button>
        </div>

        <!-- Main Download Card -->
        <div id="main-card" class="card section">
            <h2>Download Video</h2>
            <input type="text" id="url" placeholder="Paste YouTube or Shorts link here...">
            <button class="btn-primary" onclick="startDownload()">⬇ Start Download</button>

            <div id="progress-area" style="display:none; margin-top:20px;">
                <h3 id="title" style="margin-bottom:10px;"></h3>
                <div class="progress-bar" id="progress"></div>
                <p id="status" style="text-align:center; font-size:14px;"></p>
                <div class="log" id="log"></div>
            </div>

            <button class="btn-secondary" onclick="showHistory()">📜 History</button>
        </div>

        <!-- History Card -->
        <div id="history-card" class="card section">
            <h2>Download History</h2>
            <div id="history-list"></div>
            <button class="btn-secondary" onclick="backToMain()">← Back</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
